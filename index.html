<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#7c6bff"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NeuralChat — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.06);
    --accent: #7c6bff;
    --accent-glow: rgba(124,107,255,0.25);
    --accent2: #00e5b0;
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --user-bubble: #1e1b3a;
    --ai-bubble: #111118;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,107,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,107,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(12px);
    position: relative;
    z-index: 10;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #fff;
  }

  .logo span { color: var(--accent); }

  .status {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  .model-tag {
    font-size: 10px;
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }

  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }

  #chat-container::-webkit-scrollbar { width: 4px; }
  #chat-container::-webkit-scrollbar-track { background: transparent; }
  #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex;
    gap: 14px;
    max-width: 800px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.ai { align-self: flex-start; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
    font-family: var(--font-display);
    font-weight: 700;
    letter-spacing: -1px;
  }

  .avatar.ai-av {
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    color: white;
    font-size: 10px;
  }

  .avatar.user-av {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent2);
    font-size: 11px;
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.7;
    max-width: 620px;
    font-size: 13.5px;
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(124,107,255,0.2);
    border-radius: 12px 2px 12px 12px;
    color: #d4d0ff;
  }

  .message.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 2px 12px 12px 12px;
  }

  .bubble-meta {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 5px;
    letter-spacing: 0.04em;
  }

  .message.user .bubble-meta { text-align: right; }

  /* Typing indicator */
  .typing-indicator {
    display: flex; gap: 5px; align-items: center;
    padding: 14px 16px;
  }

  .typing-indicator span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s ease-in-out infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* Input area */
  footer {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
    position: relative;
    z-index: 10;
  }

  .input-wrapper {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: rgba(124,107,255,0.4);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13.5px;
    resize: none;
    line-height: 1.6;
    max-height: 120px;
    overflow-y: auto;
  }

  #user-input::placeholder { color: var(--text-muted); }

  #user-input::-webkit-scrollbar { width: 3px; }
  #user-input::-webkit-scrollbar-thumb { background: var(--border); }

  #send-btn {
    width: 36px; height: 36px;
    border-radius: 9px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    color: white;
  }

  #send-btn:hover { background: #9180ff; transform: scale(1.05); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #send-btn svg { width: 16px; height: 16px; }

  .footer-hint {
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 10px;
    letter-spacing: 0.04em;
  }

  /* Welcome screen */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 12px;
    text-align: center;
    opacity: 0.6;
    pointer-events: none;
  }

  .welcome-icon {
    font-size: 40px;
    filter: grayscale(0.3);
  }

  .welcome h2 {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }

  .welcome p { font-size: 12px; color: var(--text-muted); max-width: 300px; line-height: 1.8; }

  .suggestions {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px;
    pointer-events: all;
  }

  .suggestion-chip {
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    background: var(--surface);
    transition: all 0.2s;
    font-family: var(--font-mono);
  }

  .suggestion-chip:hover {
    border-color: rgba(124,107,255,0.4);
    color: var(--text);
    background: var(--surface2);
  }

  #clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font-mono);
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }

  #clear-btn:hover { border-color: rgba(255,80,80,0.4); color: #ff8080; }
</style>
</head>
<body>

<header>
  <div class="logo">Neural<span>Chat</span></div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="model-tag">claude-sonnet-4</div>
    <div class="status">
      <div class="status-dot"></div>
      ONLINE
    </div>
    <button id="clear-btn" onclick="clearChat()">clear</button>
  </div>
</header>

<div id="chat-container">
  <div class="welcome" id="welcome-screen">
    <div class="welcome-icon">⬡</div>
    <h2>NeuralChat</h2>
    <p>A clean AI interface powered by Claude. Ask anything — code, ideas, questions.</p>
    <div class="suggestions">
      <div class="suggestion-chip" onclick="sendSuggestion('Explain machine learning in simple terms')">Explain ML simply</div>
      <div class="suggestion-chip" onclick="sendSuggestion('Write a Python function to sort a list')">Python sort function</div>
      <div class="suggestion-chip" onclick="sendSuggestion('Give me 5 project ideas for a CS student')">CS project ideas</div>
      <div class="suggestion-chip" onclick="sendSuggestion('What is the difference between AI and ML?')">AI vs ML</div>
    </div>
  </div>
</div>

<footer>
  <div class="input-wrapper">
    <textarea id="user-input" placeholder="Type a message..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="footer-hint">Enter to send · Shift+Enter for new line</div>
</footer>

<script>
const STORAGE_KEY = 'neuralchat_history';
const MAX_STORED = 40;

const chatContainer = document.getElementById('chat-container');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const welcomeScreen = document.getElementById('welcome-screen');

let messages = [];
let displayHistory = [];
let isLoading = false;

function loadHistory() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    const parsed = JSON.parse(saved);
    messages = parsed.messages || [];
    displayHistory = parsed.display || [];
    if (messages.length > 0) {
      welcomeScreen.style.display = 'none';
      displayHistory.forEach(m => renderBubble(m.role, m.content, m.time));
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }
  } catch(e) { localStorage.removeItem(STORAGE_KEY); }
}

function saveHistory() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    messages: messages.slice(-MAX_STORED),
    display: displayHistory.slice(-MAX_STORED),
    savedAt: new Date().toISOString()
  }));
}

userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
});

userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function getTime() {
  return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function renderBubble(role, content, time) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const avatarText = role === 'ai' ? 'NC' : 'YOU';
  const avatarClass = role === 'ai' ? 'ai-av' : 'user-av';
  div.innerHTML = `
    <div class="avatar ${avatarClass}">${avatarText}</div>
    <div>
      <div class="bubble">${formatContent(content)}</div>
      <div class="bubble-meta">${time || ''}</div>
    </div>
  `;
  chatContainer.appendChild(div);
  return div;
}

function appendMessage(role, content) {
  if (welcomeScreen) welcomeScreen.style.display = 'none';
  const time = getTime();
  displayHistory.push({ role, content, time });
  renderBubble(role, content, time);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function formatContent(text) {
  return text
    .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre style="background:#0d0d14;border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:12px;margin:8px 0;overflow-x:auto;font-size:12px;line-height:1.6"><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code style="background:#1a1a24;padding:2px 6px;border-radius:4px;font-size:12px;color:#a78bfa">$1</code>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  if (welcomeScreen) welcomeScreen.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="avatar ai-av">NC</div><div class="bubble ai-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text || isLoading) return;
  isLoading = true;
  sendBtn.disabled = true;
  userInput.value = '';
  userInput.style.height = 'auto';
  messages.push({ role: 'user', content: text });
  appendMessage('user', text);
  showTyping();
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'You are NeuralChat, a helpful and concise AI assistant. Be clear and direct. Format code properly.',
        messages: messages.slice(-MAX_STORED)
      })
    });
    const data = await response.json();
    removeTyping();
    const reply = data.content?.[0]?.text || 'Something went wrong. Please try again.';
    messages.push({ role: 'assistant', content: reply });
    appendMessage('ai', reply);
    saveHistory();
  } catch (err) {
    removeTyping();
    appendMessage('ai', 'Connection error. Check your API key and try again.');
  }
  isLoading = false;
  sendBtn.disabled = false;
  userInput.focus();
}

function sendSuggestion(text) { userInput.value = text; sendMessage(); }

function clearChat() {
  messages = [];
  displayHistory = [];
  localStorage.removeItem(STORAGE_KEY);
  chatContainer.innerHTML = '';
  chatContainer.appendChild(welcomeScreen);
  welcomeScreen.style.display = 'flex';
}

loadHistory();
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}</script>
</body>
</html>
